bio: |
  Ziqi is a third-year Ph.D. student in a consecutive 
  Master’s-to-Doctoral program at the University of Chinese Academy of Sciences, 
  enrolled in September 2021. Since September 2025, 
  He has been conducting research at ROCOS, part of the State Key Laboratory of 
  Robotics and Intelligent Systems, Shenyang Institute of Automation, 
  under the supervision of Prof. Yiwen Zhao, 
  where he had also worked previously from February 2022 to August 2024. 
  From September 2024 to August 2025, he was a visiting researcher at 
  the Cognitive Robotics Group of the Department of Robotic Systems 
  at Fraunhofer IFF. In July 2021, he obtained a Bachelor of 
  Engineering in Mechanical Engineering from Zhengzhou University.

