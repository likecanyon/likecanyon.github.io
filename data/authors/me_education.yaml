bio: |
      I am a third-year Ph.D. student in a consecutive Master’s-to-Doctoral program at the <a href="https://www.ucas.ac.cn/">University of Chinese Academy of Sciences</a>, enrolled in September 2021.  Since September 2025, I have been conducting research at  <a href="https://rocos-sia.cn/">ROCOS</a>, part of the <a href="https://rlab.sia.cas.cn/">State Key Laboratory of Robotics and Intelligent Systems, Shenyang Institute of Automation</a>, 
      under the supervision of <a href="https://people.ucas.edu.cn/~zhaoyiwen">Prof. Yiwen Zhao</a>, where I had also worked previously from February 2022 to August 2024.      From September 2024 to August 2025, I was a visiting researcher at the Cognitive Robotics Group of the Department of  Robotic Systems at <a href="https://www.iff.fraunhofer.de/en.html">Fraunhofer IFF</a>. <!-- ,advised by <a href="https://www.linkedin.com/in/magnus-hanses/?originalSubdomain=en"> Magnus Hanses</a>. -->In July 2021, I obtained a Bachelor of Engineering in Mechanical Engineering from <a href="https://www.zzu.edu.cn/index.htm">Zhengzhou University</a>.


